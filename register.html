<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar - CampusFind</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(29,107,78,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(29,158,117,0.06) 0%, transparent 50%);
    }

    .auth-wrapper {
      width: 100%;
      max-width: 460px;
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 1.75rem;
      justify-content: center;
    }

    .auth-logo i {
      font-size: 24px;
      background: var(--primary);
      color: white;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--rad);
      padding: 2.25rem 2.5rem;
      box-shadow: 0 8px 40px rgba(29,107,78,0.13);
    }

    .auth-card h2 { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
    .auth-card .sub { font-size: 13px; color: var(--text-muted); margin-bottom: 1.75rem; }

    @media (max-width: 480px) {
      .auth-card { padding: 1.75rem 1.5rem; }
    }
  </style>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-logo">
    <i class="ti ti-map-search"></i>
    CampusFind
  </div>

  <div class="auth-card">
    <h2>Buat Akun Baru 🎓</h2>
    <p class="sub">Daftar untuk mulai melaporkan barang hilang atau ditemukan.</p>

    <div id="alert-register" class="alert" style="display:none; margin-bottom:1rem;"></div>

    <div class="form-row">
      <div class="form-group">
        <label>Nama Lengkap *</label>
        <input type="text" id="input-nama" placeholder="Nama lengkap" />
      </div>
      <div class="form-group">
        <label>NIM</label>
        <input type="text" id="input-nim" placeholder="NIM mahasiswa" />
      </div>
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="input-email" placeholder="email@kampus.id" />
    </div>

    <div class="form-group">
      <label>No. WhatsApp</label>
      <input type="text" id="input-hp" placeholder="08xxxxxxxxxx" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Password *</label>
        <input type="password" id="input-password" placeholder="Min. 6 karakter" />
      </div>
      <div class="form-group">
        <label>Konfirmasi Password *</label>
        <input type="password" id="input-konfirmasi" placeholder="Ulangi password" />
      </div>
    </div>

    <button class="btn btn-primary" style="width:100%; justify-content:center; padding:12px; font-size:14px; margin-top:0.25rem;" onclick="doRegister()" id="btn-register">
      <i class="ti ti-user-plus"></i> Daftar Sekarang
    </button>

    <p style="text-align:center; margin-top:1.25rem; font-size:13px; color:var(--text-muted);">
      Sudah punya akun? <a href="login.html" style="color:var(--primary); font-weight:600;">Masuk di sini</a>
    </p>
  </div>
</div>

<script src="app.js"></script>
<script>
  if (isLogin()) window.location.href = 'index.html';

  async function doRegister() {
    const nama     = document.getElementById('input-nama').value.trim();
    const nim      = document.getElementById('input-nim').value.trim();
    const email    = document.getElementById('input-email').value.trim();
    const no_hp    = document.getElementById('input-hp').value.trim();
    const password = document.getElementById('input-password').value;
    const konfirm  = document.getElementById('input-konfirmasi').value;

    if (!nama || !email || !password) {
      return tampilAlert('alert-register', 'Nama, email, dan password wajib diisi.', 'error');
    }
    if (password.length < 6) {
      return tampilAlert('alert-register', 'Password minimal 6 karakter.', 'error');
    }
    if (password !== konfirm) {
      return tampilAlert('alert-register', 'Password dan konfirmasi tidak cocok.', 'error');
    }

    const btn = document.getElementById('btn-register');
    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader ti-spin"></i> Memproses...';

    try {
      await apiFetch('/auth/register', {
        method: 'POST',
        body: JSON.stringify({ nama, email, password, nim, no_hp })
      });
      tampilAlert('alert-register', 'Registrasi berhasil! Mengarahkan ke halaman login...', 'success');
      setTimeout(() => window.location.href = 'login.html', 2000);
    } catch(e) {
      tampilAlert('alert-register', e.message, 'error');
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-user-plus"></i> Daftar Sekarang';
    }
  }

  document.getElementById('input-konfirmasi').addEventListener('keydown', e => {
    if (e.key === 'Enter') doRegister();
  });
</script>
</body>
</html>
